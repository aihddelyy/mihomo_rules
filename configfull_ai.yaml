# 这是一个 Clash 的配置文件，包含了多个功能模块的配置
# 更新于 2026-06-26 16:00:00

# 机场订阅，名称不能重复，使用时将"订阅链接"替换为实际的订阅链接

proxy-providers:
  Airport_01:
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 🟢 直连
    url: "机场订阅链接1"
  Airport_02:
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 🟢 直连
    url: "机场订阅链接2"
  Airport_03:
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 🟢 直连
    url: "机场订阅链接3"
  Airport_04:
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 🟢 直连
    url: "机场订阅链接4"


# 用于下载订阅时指定UA
global-ua: clash.meta
    
# 全局配置
mode: rule
port: 8080
socks-port: 1080
mixed-port: 7890
redir-port: 7891
tproxy-port: 7892
ipv6: true
allow-lan: true
unified-delay: true
tcp-concurrent: true
log-level: info
authentication:
  - aihdde:aihdde
skip-auth-prefixes:
- 127.0.0.1/8
- ::1/128
- 10.10.10.1/24

# 实验性配置
experimental:
  quic-go-disable-gso: true

geodata-mode: false
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.metadb"
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"

# 启用模型自动更新
lgbm-auto-update: true
# 模型更新周期,默认72小时
lgbm-update-interval: 24
# 模型升级url
lgbm-url: "https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model.bin"


# 控制面板
external-controller: 0.0.0.0:9090
secret: ""
external-ui: ui
external-ui-name: Zashboard
external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"
# 非代理访问可加镜像"https://gh-proxy.com"

# 匹配进程 always/strict/off
find-process-mode: strict
keep-alive-idle: 600
keep-alive-interval: 15

# 策略组选择和fakeip缓存
profile:
  store-selected: true
  store-fake-ip: true
  #smart-collector-size: data collection file size, the default is 100 (MB)
  smart-collector-size: 200

# 流量嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - +.v2ex.com
  skip-domain:
    - 'Mijia Cloud'
    - 'dlg.io.mi.com'
    - '+.push.apple.com'
    - '+.apple.com'
    - '+.wechat.com'
    - '+.qpic.cn'
    - '+.qq.com'
    - '+.wechatapp.com'
    - '+.vivox.com'
    # 向日葵服务
    - '+.oray.com'
    - '+.sunlogin.net'
    
# 代理模式
tun:
  enable: true
  stack: mixed
  mtu: 9000
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  
# DNS模块
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  # 是否开启 DoH 支持 HTTP/3，将并发尝试
  prefer-h3: false
  respect-rules: true
  # 模式切换 redir-host / fake-ip
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/16
  fake-ip-range6: fc00::/7
  # 模式切换 whitelist/blacklist 
  # 黑名单模式表示如果匹配成功则不返回 Fake-IP, 白名单模式时只有匹配成功才返回 Fake-IP
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - 'rule-set:Fakeip_filter_domain,Steam_cn_domain,Steam_CDN_domain,Private_domain,DirectLite_domain,Apple_cn_domain,CN_domain,Github_domain'
  nameserver-policy:
    'rule-set:ProxyLite_domain,GFW_domain,geolocation-!cn':
      - https://dns.quad9.net/dns-query
      - https://dns.cloudflare.com/dns-query
      - https://dns.google/dns-query
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query#h3=true
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query#h3=true
    - https://doh.pub/dns-query
  nameserver:
    - https://dns.alidns.com/dns-query#h3=true
    - https://doh.pub/dns-query
  

# ================= YAML 锚点 =================

# 1. 策略组继承模板 (Tpl 代表 Template)
TplDefault: &TplDF {type: select, proxies: [自动选择, 手动选择, 故障转移, 全球直连, 自建/家宽节点, 港台节点, 香港节点, 台湾节点, 新加坡节点, 日本节点, 韩国节点, 美国节点, 英国节点, 欧洲节点, 其他国家, 🟢 直连]}
TplProxyFirst: &TplPF {type: select, proxies: [默认代理, 自动选择, 手动选择, 故障转移, 全球直连, 自建/家宽节点, 港台节点, 香港节点, 台湾节点, 新加坡节点, 日本节点, 韩国节点, 美国节点, 英国节点, 欧洲节点, 其他国家]}
TplDirectFirst: &TplDR {type: select, proxies: [全球直连, 默认代理, 自动选择, 手动选择, 故障转移, 自建/家宽节点, 港台节点, 香港节点, 台湾节点, 新加坡节点, 日本节点, 韩国节点, 美国节点, 英国节点, 欧洲节点, 其他国家]}
TplIncludeAll: &TplIA {type: select, proxies: [默认代理, 自动选择, 手动选择, 故障转移, 全球直连, 自建/家宽节点, 港台节点, 香港节点, 台湾节点, 新加坡节点, 日本节点, 韩国节点, 美国节点, 英国节点, 欧洲节点, 其他国家], include-all: true}
TplStreamingMedia: &TplSM {type: select, proxies: [默认代理, 自动选择, 手动选择, 港台自动, 香港自动, 台湾自动, 新加坡自动, 日本自动, 韩国自动, 美国自动, 英国自动, 欧洲自动, 其他国家]}

# 2. 策略组模式配置 (Mode 前缀)
ModeUrlTestHidden: &UTH {type: url-test, tolerance: 20, interval: 60, lazy: true, hidden: true}
ModeUrlTest: &UT {type: url-test, include-all: true, tolerance: 20, interval: 60, lazy: true}
ModeLoadBalance: &LB {type: load-balance, interval: 60, lazy: true, strategy: consistent-hashing, hidden: true}
ModeSmart: &ST {type: smart, uselightgbm: true, collectdata: false, sample-rate: 1, prefer-asn: true, interval: 60, lazy: true, hidden: true}
ModeFallback: &FB {type: fallback, interval: 60, lazy: true, hidden: true}

# 3. 地区正则过滤器 (Filter 前缀)
FilterHome: &Home "(?i)(自建|CF|The_house|private|home|家宽|hgc|HKT|HKBN|icable|Hinet|att)"
FilterHKTW: &HKTW "(?i)(香港|🇭🇰|hk|hongkong|Hong Kong|台|🇹🇼|TW|Taiwan)"
FilterHK: &HK "(?i)(香港|🇭🇰|hk|hongkong|Hong Kong)"
FilterTW: &TW "(?i)(台|🇹🇼|TW|Taiwan)"
FilterSG: &SG "(?i)(新|🇸🇬|SG|singapore)"
FilterJP: &JP "(?i)(日本|🇯🇵|JP|Japan)"
FilterKR: &KR "(?i)(韩国|🇰🇷|KR|Korea)"
FilterUS: &US "(?i)(美|🇺🇲|US|America|United States)"
FilterUK: &UK "(?i)(英|GB|UK|England|British)"
FilterEU: &EU "(?i)(俄|德|土|荷|法|意|西班牙|波兰|卢|罗|葡|希|瑞|乌|挪|格|阿塞拜疆|摩|塞|克|冰|匈|波黑|DE|FR|Türkiye|Netherlands|Switzerland|Sweden|Portugal|Poland|España|Romania|Iceland|SaltyFish)"
FilterOthers: &OT "(?i)(直连|港|台|日|韩|新|美|英|德|俄|土|荷|法|意|瑞|西|波|卢|罗|葡|希|乌|挪|格|阿塞拜疆|摩|塞|克|冰|匈|波黑|家宽|CF)"


