# Aihdde mihomo 配置 - lite版 （2026-06-28 更新）
# 项目: https://github.com/aihddelyy/mihomo_rules
# 请在 proxy-providers 中添加您的订阅链接


# ================= YAML 锚点 =================

# 0. 机场订阅锚点
x-base-provider: &base-provider {type: http, interval: 86400, health-check: {enable: true, url: https://www.gstatic.com/generate_204, interval: 300}, proxy: "🟢 直连"}

# 1. 策略组模式锚点
x-select:       &select       {type: select, interval: 300, lazy: true}
x-url-test:     &url-test     {type: url-test, interval: 300, tolerance: 20, lazy: true, include-all: true, hidden: true}
x-load-balance: &load-balance {type: load-balance, interval: 300, lazy: true, strategy: consistent-hashing, hidden: true, include-all: true}
x-fallback:     &fallback     {type: fallback, interval: 300, lazy: true, hidden: true}
x-smart:        &smart        {type: smart, uselightgbm: true, collectdata: false, sample-rate: 1, prefer-asn: true, interval: 300, lazy: true, include-all: true, hidden: true}

# 2. 策略组模板锚点
x-default:      &default      {<<: *select, proxies: [自动选择, 手动选择, 故障转移, 全球直连, 自建/家宽节点, 港台节点, 香港节点, 台湾节点, 新加坡节点, 日本节点, 韩国节点, 美国节点, 英国节点, 欧洲节点, 其他国家]}
x-proxy-first:  &proxy-first  {<<: *select, proxies: [默认代理, 自动选择, 手动选择, 故障转移, 全球直连, 自建/家宽节点, 港台节点, 香港节点, 台湾节点, 新加坡节点, 日本节点, 韩国节点, 美国节点, 英国节点, 欧洲节点, 其他国家]}
x-direct-first: &direct-first {<<: *select, proxies: [全球直连, 默认代理, 自动选择, 手动选择, 故障转移, 自建/家宽节点, 港台节点, 香港节点, 台湾节点, 新加坡节点, 日本节点, 韩国节点, 美国节点, 英国节点, 欧洲节点, 其他国家]}
x-stream-media: &stream-media {<<: *select, proxies: [默认代理, 自动选择, 手动选择, 港台自动, 香港自动, 台湾自动, 新加坡自动, 日本自动, 韩国自动, 美国自动, 英国自动, 欧洲自动, 其他国家]}

# 3. 地区正则过滤器锚点
x-filter-home:  &filter-home  "(?i)(自建|CF|The_house|private|home|家宽|hgc|HKT|HKBN|icable|Hinet|att)"
x-filter-hktw:  &filter-hktw  "(?i)(香港|🇭🇰|hk|hongkong|Hong Kong|台|🇹🇼|TW|Taiwan)"
x-filter-hk:    &filter-hk    "(?i)(香港|🇭🇰|hk|hongkong|Hong Kong)"
x-filter-tw:    &filter-tw    "(?i)(台|🇹🇼|TW|Taiwan)"
x-filter-sg:    &filter-sg    "(?i)(新|🇸🇬|SG|singapore)"
x-filter-jp:    &filter-jp    "(?i)(日本|🇯🇵|JP|Japan)"
x-filter-kr:    &filter-kr    "(?i)(韩国|🇰🇷|KR|Korea)"
x-filter-us:    &filter-us    "(?i)(美|🇺🇲|US|America|United States)"
x-filter-uk:    &filter-uk    "(?i)(英|GB|UK|England|British)"
x-filter-eu:    &filter-eu    "(?i)(俄|德|土|荷|法|意|西班牙|波兰|卢|罗|葡|希|瑞|乌|挪|格|阿塞拜疆|摩|塞|克|冰|匈|波黑|DE|FR|Türkiye|Netherlands|Switzerland|Sweden|Portugal|Poland|España|Romania|Iceland|SaltyFish)"
x-filter-ot:    &filter-ot    "(?i)(直连|港|台|日|韩|新|美|英|德|俄|土|荷|法|意|瑞|西班牙|波|卢|罗|葡|希|乌|挪|格|阿塞拜疆|摩|塞|克|冰|匈|波黑|家宽|CF)"

# 4. 规则集模式锚点
x-rule-set-ipcidr: &rule-set-ipcidr {type: http, interval: 86400, behavior: ipcidr, format: mrs}
x-rule-set-domain: &rule-set-domain {type: http, interval: 86400, behavior: domain, format: mrs}
x-rule-set-classical: &rule-set-classical {type: http, interval: 86400, behavior: classical, format: text}

# ================= YAML 锚点结束 =================

# 机场订阅，名称不能重复，使用时将"订阅链接"替换为实际的订阅链接
proxy-providers:
  Airport_01: {<<: *base-provider, url: "机场订阅链接1"}
  Airport_02: {<<: *base-provider, url: "机场订阅链接2"}
  Airport_03: {<<: *base-provider, url: "机场订阅链接3"}
  Airport_04: {<<: *base-provider, url: "机场订阅链接4"}

# 用于下载订阅时指定UA
global-ua: clash.meta
    
# 全局配置
mode: rule
port: 8080
socks-port: 1080
mixed-port: 7890
redir-port: 7891
tproxy-port: 7892
ipv6: true
allow-lan: true
unified-delay: true
tcp-concurrent: true
log-level: info
authentication:
  - aihdde:aihdde
skip-auth-prefixes:
- 127.0.0.1/8
- ::1/128
- 10.10.10.1/24

# 实验性配置
experimental:
  quic-go-disable-gso: true

geodata-mode: false
# GEO 文件加载模式（standard：标准加载器/memconservative：专为内存受限 (小内存) 设备优化的加载器 (默认值)）
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.metadb"
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"
  
# 控制面板
external-controller: 0.0.0.0:9090
secret: "123456"
external-ui: ui
external-ui-name: Zashboard
external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"
# 非代理访问可加镜像"https://gh-proxy.com"

# 匹配进程 always/strict/off
find-process-mode: strict
keep-alive-idle: 600
keep-alive-interval: 15

# 策略组选择和fakeip缓存
profile:
  store-selected: true
  store-fake-ip: true
  
# 流量嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - +.v2ex.com
  skip-domain:
    - 'Mijia Cloud'
    - 'dlg.io.mi.com'
    - '+.push.apple.com'
    - '+.apple.com'
    - '+.wechat.com'
    - '+.qpic.cn'
    - '+.qq.com'
    - '+.wechatapp.com'
    - '+.vivox.com'
    # 向日葵服务
    - '+.oray.com'
    - '+.sunlogin.net'
    
# 代理模式
tun:
  enable: true
  stack: mixed
  mtu: 9000
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  
# DNS模块
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  # 是否开启 DoH 支持 HTTP/3，将并发尝试
  prefer-h3: false
  respect-rules: true
  # 模式切换 redir-host / fake-ip
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/16
  fake-ip-range6: fc00::/7
  # 模式切换 whitelist/blacklist 
  # 黑名单模式表示如果匹配成功则不返回 Fake-IP, 白名单模式时只有匹配成功才返回 Fake-IP
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - 'rule-set:Fakeip_filter_domain,Steam_cn_domain,Steam_CDN_domain,Private_domain,DirectLite_domain,Apple_cn_domain,CN_domain,Github_domain'
  nameserver-policy:
    'rule-set:Steam_cn_domain,Steam_CDN_domain,Private_domain,DirectLite_domain,Apple_cn_domain,CN_domain':
      - https://dns.alidns.com/dns-query#h3=true
      - https://doh.pub/dns-query
    'rule-set:ProxyLite_domain,GFW_domain,geolocation-!cn':
      - https://dns.quad9.net/dns-query
      - https://dns.cloudflare.com/dns-query
      - https://dns.google/dns-query
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query#h3=true
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query#h3=true
    - https://doh.pub/dns-query
  nameserver:
    - https://dns.alidns.com/dns-query#h3=true
    - https://doh.pub/dns-query

 
